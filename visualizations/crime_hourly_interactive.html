<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SF Crime | Hourly Interactive Analysis</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    :root {
      --bg: #0e1729;
      --panel: #16233f;
      --line: #2f4470;
      --text: #e8eef8;
      --muted: #9eb0cb;
      --accent: #2ec4b6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 600px at 100% -10%, rgba(46,196,182,0.15), transparent 60%),
        var(--bg);
      padding: 14px;
    }
    .panel {
      background: rgba(22,35,63,0.94);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.2rem;
    }
    p {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
    }
    .chart {
      width: 100%;
      height: 360px;
    }
    .note {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.82rem;
    }
    #status {
      margin-top: 8px;
      font-size: 0.9rem;
      color: #ffd2a7;
    }
  </style>
</head>
<body>
  <div class="panel">
    <h1>Crime Intensity by Hour and Weekday</h1>
    <p>Heatmap aggregated from the combined SF incidents dataset.</p>
    <div id="heatmap" class="chart"></div>
  </div>

  <div class="panel">
    <h1>Top Crime Categories by Hour</h1>
    <p>Hourly pattern comparison for the six most frequent categories.</p>
    <div id="lines" class="chart"></div>
    <div class="note">Use legend click to isolate categories.</div>
    <div id="status"></div>
  </div>

  <script>
    function fail(msg) {
      const el = document.getElementById("status");
      el.textContent = msg;
    }

    async function loadJson(path) {
      const res = await fetch(path, { cache: "no-store" });
      if (!res.ok) throw new Error("Failed to load " + path + " (" + res.status + ")");
      return res.json();
    }

    async function main() {
      try {
        const [heat, cat] = await Promise.all([
          loadJson("../data/weekday_hour_heatmap.json"),
          loadJson("../data/hourly_top_categories.json")
        ]);

        const heatTrace = {
          type: "heatmap",
          z: heat.z,
          x: heat.hours,
          y: heat.weekdays,
          colorscale: "YlOrRd",
          hovertemplate: "%{y}<br>%{x}<br>Incidents: %{z}<extra></extra>"
        };

        Plotly.newPlot("heatmap", [heatTrace], {
          margin: { l: 80, r: 16, t: 10, b: 42 },
          paper_bgcolor: "rgba(0,0,0,0)",
          plot_bgcolor: "rgba(0,0,0,0)",
          font: { color: "#e8eef8" },
          xaxis: { title: "Hour of Day", tickangle: -35, gridcolor: "#203153" },
          yaxis: { title: "Weekday", gridcolor: "#203153" }
        }, { responsive: true, displaylogo: false });

        const lineTraces = cat.series.map((s) => ({
          type: "scatter",
          mode: "lines",
          name: s.name + " (" + s.total.toLocaleString() + ")",
          x: cat.hours,
          y: s.values,
          hovertemplate: "%{fullData.name}<br>%{x}: %{y}<extra></extra>"
        }));

        Plotly.newPlot("lines", lineTraces, {
          margin: { l: 58, r: 20, t: 10, b: 42 },
          paper_bgcolor: "rgba(0,0,0,0)",
          plot_bgcolor: "rgba(0,0,0,0)",
          font: { color: "#e8eef8" },
          xaxis: { title: "Hour of Day", tickangle: -35, gridcolor: "#203153" },
          yaxis: { title: "Incident Count", gridcolor: "#203153" },
          legend: { orientation: "h", y: 1.14 }
        }, { responsive: true, displaylogo: false });
      } catch (err) {
        console.error(err);
        fail("Interactive data failed to load. Check ../data/*.json files.");
      }
    }

    main();
  </script>
</body>
</html>
