<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SF Crime | Spatial Hotspots</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
  <style>
    :root {
      --bg: #101b31;
      --panel: #1a2b4b;
      --line: #35527d;
      --text: #e7eef8;
      --muted: #9eb0cb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Arial, sans-serif;
      padding: 12px;
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      overflow: hidden;
    }
    .head {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
    }
    h1 {
      margin: 0 0 6px;
      font-size: 1.1rem;
    }
    p {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }
    #map {
      width: 100%;
      height: 430px;
      background: #0a1222;
    }
    #status {
      padding: 8px 12px 10px;
      color: #ffd2a7;
      font-size: 0.86rem;
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="head">
      <h1>SF Crime Hotspots</h1>
      <p>Leaflet heatmap built from aggregated incident coordinates.</p>
    </div>
    <div id="map"></div>
    <div id="status"></div>
  </div>

  <script>
    const map = L.map("map", {
      zoomControl: true,
      minZoom: 10,
      maxZoom: 17
    }).setView([37.7749, -122.4194], 12);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    const status = document.getElementById("status");

    async function load() {
      try {
        const res = await fetch("../data/crime_hotspots.json", { cache: "no-store" });
        if (!res.ok) throw new Error("Load failed: " + res.status);
        const hot = await res.json();
        const max = hot.max || 1;

        const heatPoints = hot.points.map((p) => [p.lat, p.lon, Math.max(0.08, p.count / max)]);
        L.heatLayer(heatPoints, {
          radius: 17,
          blur: 14,
          maxZoom: 16,
          gradient: {
            0.2: "#3ddad7",
            0.45: "#ffd166",
            0.7: "#f77f00",
            1.0: "#d62828"
          }
        }).addTo(map);

        hot.points.slice(0, 120).forEach((p) => {
          L.circleMarker([p.lat, p.lon], {
            radius: 2,
            weight: 0,
            fillOpacity: 0.55,
            color: "#ffe8b5"
          }).bindPopup("Incidents: " + p.count.toLocaleString()).addTo(map);
        });

        status.textContent = "Hotspot cells loaded: " + hot.points.length.toLocaleString();
      } catch (err) {
        console.error(err);
        status.textContent = "Map data failed to load. Check ../data/crime_hotspots.json";
      }
    }

    load();
  </script>
</body>
</html>
