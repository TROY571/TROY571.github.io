<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Drug Offense annual trend and district concentration</title>
  <desc id="desc">Two-panel static figure. Left: Drug Offense counts fall in 2020 and 2021 before rising again. Right: Tenderloin has a much higher Drug Offense ratio than every other district.</desc>
  <rect width="1200" height="560" fill="#24305E"/>

  <text x="52" y="44" fill="#F8E9A1" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">
    Drug Offense is both temporally disrupted and geographically concentrated
  </text>
  <text x="52" y="70" fill="#A8D0E6" font-size="15" font-family="Segoe UI, Arial, sans-serif">
    Left panel: annual counts, 2018-2024. Right panel: district ratio relative to the citywide Drug Offense share.
  </text>

  <text x="78" y="102" fill="#F8E9A1" font-size="17" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Annual counts</text>
  <line x1="78" y1="360" x2="520" y2="360" stroke="#5164A8" stroke-width="1"/>
  <line x1="78" y1="303.1" x2="520" y2="303.1" stroke="#5164A8" stroke-width="1"/>
  <line x1="78" y1="246.2" x2="520" y2="246.2" stroke="#5164A8" stroke-width="1"/>
  <line x1="78" y1="189.4" x2="520" y2="189.4" stroke="#5164A8" stroke-width="1"/>
  <line x1="78" y1="132.5" x2="520" y2="132.5" stroke="#5164A8" stroke-width="1"/>
  <text x="36" y="365" fill="#A8D0E6" font-size="13" font-family="Segoe UI, Arial, sans-serif">0</text>
  <text x="20" y="308.1" fill="#A8D0E6" font-size="13" font-family="Segoe UI, Arial, sans-serif">1k</text>
  <text x="20" y="251.2" fill="#A8D0E6" font-size="13" font-family="Segoe UI, Arial, sans-serif">2k</text>
  <text x="20" y="194.4" fill="#A8D0E6" font-size="13" font-family="Segoe UI, Arial, sans-serif">3k</text>
  <text x="20" y="137.5" fill="#A8D0E6" font-size="13" font-family="Segoe UI, Arial, sans-serif">4k</text>

  <rect x="88" y="131" width="48" height="229" rx="4" fill="#A8D0E6"/>
  <rect x="149" y="158" width="48" height="202" rx="4" fill="#A8D0E6"/>
  <rect x="210" y="216" width="48" height="144" rx="4" fill="#F76C6C"/>
  <rect x="271" y="238" width="48" height="122" rx="4" fill="#F76C6C"/>
  <rect x="332" y="146" width="48" height="214" rx="4" fill="#A8D0E6"/>
  <rect x="393" y="110" width="48" height="250" rx="4" fill="#A8D0E6"/>
  <rect x="454" y="117" width="48" height="243" rx="4" fill="#A8D0E6"/>

  <text x="112" y="382" text-anchor="middle" fill="#F8E9A1" font-size="12" font-family="Segoe UI, Arial, sans-serif">2018</text>
  <text x="173" y="382" text-anchor="middle" fill="#F8E9A1" font-size="12" font-family="Segoe UI, Arial, sans-serif">2019</text>
  <text x="234" y="382" text-anchor="middle" fill="#F8E9A1" font-size="12" font-family="Segoe UI, Arial, sans-serif">2020</text>
  <text x="295" y="382" text-anchor="middle" fill="#F8E9A1" font-size="12" font-family="Segoe UI, Arial, sans-serif">2021</text>
  <text x="356" y="382" text-anchor="middle" fill="#F8E9A1" font-size="12" font-family="Segoe UI, Arial, sans-serif">2022</text>
  <text x="417" y="382" text-anchor="middle" fill="#F8E9A1" font-size="12" font-family="Segoe UI, Arial, sans-serif">2023</text>
  <text x="478" y="382" text-anchor="middle" fill="#F8E9A1" font-size="12" font-family="Segoe UI, Arial, sans-serif">2024</text>

  <text x="234" y="204" text-anchor="middle" fill="#F8E9A1" font-size="12" font-family="Segoe UI, Arial, sans-serif">2020 dip</text>
  <text x="295" y="226" text-anchor="middle" fill="#F8E9A1" font-size="12" font-family="Segoe UI, Arial, sans-serif">2021 low</text>
  <text x="417" y="98" text-anchor="middle" fill="#F8E9A1" font-size="12" font-family="Segoe UI, Arial, sans-serif">4,217</text>

  <line x1="78" y1="110" x2="78" y2="360" stroke="#A8D0E6" stroke-width="1.2"/>
  <line x1="78" y1="360" x2="520" y2="360" stroke="#A8D0E6" stroke-width="1.2"/>

  <text x="640" y="102" fill="#F8E9A1" font-size="17" font-family="Segoe UI, Arial, sans-serif" font-weight="700">District ratio</text>
  <text x="640" y="123" fill="#A8D0E6" font-size="13" font-family="Segoe UI, Arial, sans-serif">A value of 1.0 means the district matches the citywide Drug Offense share.</text>
  <line x1="709" y1="142" x2="709" y2="472" stroke="#F8E9A1" stroke-dasharray="5 5" stroke-width="1.5"/>
  <text x="709" y="136" text-anchor="middle" fill="#F8E9A1" font-size="12" font-family="Segoe UI, Arial, sans-serif">city average</text>

  <text x="640" y="170" fill="#F8E9A1" font-size="13" font-family="Segoe UI, Arial, sans-serif">Tenderloin</text>
  <rect x="760" y="156" width="358" height="24" rx="4" fill="#F76C6C"/>
  <text x="1128" y="173" fill="#F8E9A1" font-size="12" font-family="Segoe UI, Arial, sans-serif">5.17x</text>

  <text x="640" y="208" fill="#F8E9A1" font-size="13" font-family="Segoe UI, Arial, sans-serif">Mission</text>
  <rect x="760" y="194" width="75" height="24" rx="4" fill="#A8D0E6"/>
  <text x="845" y="211" fill="#F8E9A1" font-size="12" font-family="Segoe UI, Arial, sans-serif">1.09x</text>

  <text x="640" y="246" fill="#F8E9A1" font-size="13" font-family="Segoe UI, Arial, sans-serif">Southern</text>
  <rect x="760" y="232" width="67" height="24" rx="4" fill="#A8D0E6"/>
  <text x="837" y="249" fill="#F8E9A1" font-size="12" font-family="Segoe UI, Arial, sans-serif">0.97x</text>

  <text x="640" y="284" fill="#F8E9A1" font-size="13" font-family="Segoe UI, Arial, sans-serif">Northern</text>
  <rect x="760" y="270" width="35" height="24" rx="4" fill="#374785"/>
  <text x="805" y="287" fill="#F8E9A1" font-size="12" font-family="Segoe UI, Arial, sans-serif">0.51x</text>

  <text x="640" y="322" fill="#F8E9A1" font-size="13" font-family="Segoe UI, Arial, sans-serif">Central</text>
  <rect x="760" y="308" width="31" height="24" rx="4" fill="#374785"/>
  <text x="801" y="325" fill="#F8E9A1" font-size="12" font-family="Segoe UI, Arial, sans-serif">0.45x</text>

  <text x="640" y="360" fill="#F8E9A1" font-size="13" font-family="Segoe UI, Arial, sans-serif">Bayview</text>
  <rect x="760" y="346" width="22" height="24" rx="4" fill="#374785"/>
  <text x="792" y="363" fill="#F8E9A1" font-size="12" font-family="Segoe UI, Arial, sans-serif">0.32x</text>

  <text x="640" y="398" fill="#F8E9A1" font-size="13" font-family="Segoe UI, Arial, sans-serif">Park</text>
  <rect x="760" y="384" width="22" height="24" rx="4" fill="#374785"/>
  <text x="792" y="401" fill="#F8E9A1" font-size="12" font-family="Segoe UI, Arial, sans-serif">0.32x</text>

  <text x="640" y="436" fill="#F8E9A1" font-size="13" font-family="Segoe UI, Arial, sans-serif">Ingleside</text>
  <rect x="760" y="422" width="18" height="24" rx="4" fill="#374785"/>
  <text x="788" y="439" fill="#F8E9A1" font-size="12" font-family="Segoe UI, Arial, sans-serif">0.26x</text>

  <text x="640" y="486" fill="#A8D0E6" font-size="13" font-family="Segoe UI, Arial, sans-serif">
    Tenderloin stands far outside the rest of the city, which is why district averages are already telling a non-uniform story.
  </text>
</svg>
