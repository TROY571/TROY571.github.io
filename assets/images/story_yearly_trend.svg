<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Larceny theft incidents by year</title>
  <desc id="desc">Annual larceny theft counts from 2018 to 2024, showing a high plateau in 2018-2019, a sharp drop in 2020, and an incomplete rebound after that.</desc>
  <rect width="1200" height="520" fill="#101b31"/>

  <text x="82" y="40" fill="#e8eef8" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">
    Larceny theft drops after 2019 and never fully returns to its late-2010s level
  </text>
  <text x="82" y="66" fill="#9fb2cc" font-size="15" font-family="Segoe UI, Arial, sans-serif">
    Recorded annual larceny theft incidents in the combined dataset, 2018-2024.
  </text>

  <line x1="82" y1="436" x2="1158" y2="436" stroke="#24375b" stroke-width="1"/>
  <line x1="82" y1="358.3" x2="1158" y2="358.3" stroke="#24375b" stroke-width="1"/>
  <line x1="82" y1="280.7" x2="1158" y2="280.7" stroke="#24375b" stroke-width="1"/>
  <line x1="82" y1="203" x2="1158" y2="203" stroke="#24375b" stroke-width="1"/>
  <line x1="82" y1="125.3" x2="1158" y2="125.3" stroke="#24375b" stroke-width="1"/>

  <text x="24" y="441" fill="#8fa6c4" font-size="13" font-family="Segoe UI, Arial, sans-serif">0</text>
  <text x="6" y="363.3" fill="#8fa6c4" font-size="13" font-family="Segoe UI, Arial, sans-serif">10k</text>
  <text x="6" y="285.7" fill="#8fa6c4" font-size="13" font-family="Segoe UI, Arial, sans-serif">20k</text>
  <text x="6" y="208" fill="#8fa6c4" font-size="13" font-family="Segoe UI, Arial, sans-serif">30k</text>
  <text x="6" y="130.3" fill="#8fa6c4" font-size="13" font-family="Segoe UI, Arial, sans-serif">40k</text>

  <rect x="82" y="92" width="141" height="344" rx="4" fill="#ff8a5b"/>
  <rect x="237" y="94" width="141" height="342" rx="4" fill="#d46b52"/>
  <rect x="392" y="217" width="141" height="219" rx="4" fill="#2ec4b6"/>
  <rect x="547" y="166" width="141" height="270" rx="4" fill="#6381b2"/>
  <rect x="702" y="137" width="141" height="299" rx="4" fill="#6381b2"/>
  <rect x="857" y="169" width="141" height="267" rx="4" fill="#6381b2"/>
  <rect x="1012" y="253" width="141" height="183" rx="4" fill="#6381b2"/>

  <text x="152.5" y="478" text-anchor="middle" fill="#8fa6c4" font-size="13" font-family="Segoe UI, Arial, sans-serif">2018</text>
  <text x="307.5" y="478" text-anchor="middle" fill="#8fa6c4" font-size="13" font-family="Segoe UI, Arial, sans-serif">2019</text>
  <text x="462.5" y="478" text-anchor="middle" fill="#8fa6c4" font-size="13" font-family="Segoe UI, Arial, sans-serif">2020</text>
  <text x="617.5" y="478" text-anchor="middle" fill="#8fa6c4" font-size="13" font-family="Segoe UI, Arial, sans-serif">2021</text>
  <text x="772.5" y="478" text-anchor="middle" fill="#8fa6c4" font-size="13" font-family="Segoe UI, Arial, sans-serif">2022</text>
  <text x="927.5" y="478" text-anchor="middle" fill="#8fa6c4" font-size="13" font-family="Segoe UI, Arial, sans-serif">2023</text>
  <text x="1082.5" y="478" text-anchor="middle" fill="#8fa6c4" font-size="13" font-family="Segoe UI, Arial, sans-serif">2024</text>

  <text x="152.5" y="82" text-anchor="middle" fill="#e8eef8" font-size="12" font-family="Segoe UI, Arial, sans-serif">44,291</text>
  <text x="462.5" y="207" text-anchor="middle" fill="#e8eef8" font-size="12" font-family="Segoe UI, Arial, sans-serif">28,202</text>
  <text x="1082.5" y="243" text-anchor="middle" fill="#e8eef8" font-size="12" font-family="Segoe UI, Arial, sans-serif">23,553</text>

  <line x1="82" y1="92" x2="82" y2="436" stroke="#486384" stroke-width="1.2"/>
  <line x1="82" y1="436" x2="1158" y2="436" stroke="#486384" stroke-width="1.2"/>

  <rect x="770" y="82" width="18" height="18" rx="3" fill="#ff8a5b"/>
  <text x="796" y="96" fill="#c9d7ea" font-size="13" font-family="Segoe UI, Arial, sans-serif">late-2010s peak</text>
  <rect x="935" y="82" width="18" height="18" rx="3" fill="#2ec4b6"/>
  <text x="961" y="96" fill="#c9d7ea" font-size="13" font-family="Segoe UI, Arial, sans-serif">2020 drop</text>
</svg>
